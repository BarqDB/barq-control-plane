openapi: 3.1.0
info:
  title: Barq private data-plane API
  version: 1.0.0
  description: Private protocol between barq-server and the C++ Barq data process.
servers:
  - url: http://127.0.0.1:9091
security:
  - bearerAuth: []
paths:
  /internal/v1/health:
    get:
      summary: Check data-plane health
      operationId: health
      responses:
        "200":
          description: Data plane is ready.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Health"}
  /internal/v1/read:
    post:
      summary: Read one object
      operationId: readObject
      requestBody: {$ref: "#/components/requestBodies/JSONRequest"}
      responses:
        "200":
          description: Object found.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Object"}
        default: {$ref: "#/components/responses/Error"}
  /internal/v1/write:
    post:
      summary: Commit one object write
      operationId: writeObject
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/WriteRequest"}
      responses:
        "200":
          description: Write committed.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/WriteResult"}
        default: {$ref: "#/components/responses/Error"}
  /internal/v1/query:
    post:
      summary: Query objects
      operationId: queryObjects
      requestBody: {$ref: "#/components/requestBodies/JSONRequest"}
      responses:
        "200":
          description: Query result.
          content:
            application/json:
              schema: {type: object}
        default: {$ref: "#/components/responses/Error"}
  /internal/v1/batch:
    post:
      summary: Commit an atomic write batch
      operationId: executeBatch
      requestBody: {$ref: "#/components/requestBodies/JSONRequest"}
      responses:
        "200":
          description: Atomic batch result.
          content:
            application/json:
              schema: {type: object}
        default: {$ref: "#/components/responses/Error"}
  /internal/v1/schema/plan:
    post:
      summary: Plan a schema change
      operationId: planSchema
      requestBody: {$ref: "#/components/requestBodies/JSONRequest"}
      responses:
        "200": {$ref: "#/components/responses/JSON"}
        default: {$ref: "#/components/responses/Error"}
  /internal/v1/schema/read:
    post:
      summary: Read the active database schema
      operationId: readSchema
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/ScopedRequest"}
      responses:
        "200":
          description: Active schema used to build sync rules.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Schema"}
        default: {$ref: "#/components/responses/Error"}
  /internal/v1/schema/apply:
    post:
      summary: Apply a schema change
      operationId: applySchema
      requestBody: {$ref: "#/components/requestBodies/JSONRequest"}
      responses:
        "200": {$ref: "#/components/responses/JSON"}
        default: {$ref: "#/components/responses/Error"}
  /internal/v1/flx/rules/read:
    post:
      summary: Read the active FLX rule revision
      operationId: readFLXRules
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/ScopedRequest"}
      responses:
        "200":
          description: Active immutable rule set.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/FLXRuleSet"}
        default: {$ref: "#/components/responses/Error"}
  /internal/v1/flx/rules/plan:
    post:
      summary: Validate and plan an FLX rule revision
      operationId: planFLXRules
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/FLXRulesChangeRequest"}
      responses:
        "200": {$ref: "#/components/responses/JSON"}
        default: {$ref: "#/components/responses/Error"}
  /internal/v1/flx/rules/apply:
    post:
      summary: Persist and activate an FLX rule revision
      operationId: applyFLXRules
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/FLXRulesChangeRequest"}
      responses:
        "200": {$ref: "#/components/responses/JSON"}
        default: {$ref: "#/components/responses/Error"}
  /internal/v1/flx/rules/test:
    post:
      summary: Test active or candidate FLX rules against one stored object
      operationId: testFLXRules
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/FLXRulesTestRequest"}
      responses:
        "200": {$ref: "#/components/responses/JSON"}
        default: {$ref: "#/components/responses/Error"}
  /internal/v1/changes:
    get:
      summary: Read ordered database changes
      operationId: readChanges
      parameters:
        - {name: tenant, in: query, required: true, schema: {type: string}}
        - {name: database, in: query, required: true, schema: {type: string}}
        - {name: after, in: query, required: true, schema: {type: integer, minimum: 0}}
        - {name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 1000}}
        - {name: wait_ms, in: query, schema: {type: integer, minimum: 0, maximum: 30000}}
      responses:
        "200":
          description: Ordered changes after the cursor. Events may repeat.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/ChangesResult"}
        default: {$ref: "#/components/responses/Error"}
  /internal/v1/events/materialize:
    post:
      summary: Materialize an event snapshot
      operationId: materializeEvent
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/MaterializeRequest"}
      responses:
        "200":
          description: Event data read from its committed snapshot.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/EventContext"}
        default: {$ref: "#/components/responses/Error"}
components:
  securitySchemes:
    bearerAuth: {type: http, scheme: bearer}
  requestBodies:
    JSONRequest:
      required: true
      content:
        application/json:
          schema: {type: object}
  responses:
    JSON:
      description: JSON response.
      content:
        application/json:
          schema: {type: object}
    Error:
      description: Request failed.
      content:
        application/json:
          schema: {$ref: "#/components/schemas/Error"}
  schemas:
    Scope:
      type: object
      additionalProperties: false
      required: [tenant, database]
      properties:
        tenant: {type: string, minLength: 1}
        database: {type: string, minLength: 1}
    ScopedRequest:
      type: object
      additionalProperties: false
      required: [scope]
      properties:
        request_id: {type: string}
        scope: {$ref: "#/components/schemas/Scope"}
    SchemaProperty:
      type: object
      additionalProperties: false
      required: [name, type]
      properties:
        name: {type: string}
        type: {type: string}
        nullable: {type: boolean}
        primary_key: {type: boolean}
        collection: {type: string}
        target: {type: string}
        embedded: {type: boolean}
    SchemaObject:
      type: object
      additionalProperties: false
      required: [name, properties]
      properties:
        name: {type: string}
        properties: {type: array, items: {$ref: "#/components/schemas/SchemaProperty"}}
    Schema:
      type: object
      additionalProperties: false
      required: [version, objects]
      properties:
        version: {type: integer, minimum: 0}
        objects: {type: array, items: {$ref: "#/components/schemas/SchemaObject"}}
    FLXRule:
      type: object
      additionalProperties: false
      required: [object_type, read, write]
      properties:
        object_type: {type: string, minLength: 1}
        read: {type: string}
        write: {type: string}
    FLXRuleSet:
      type: object
      additionalProperties: false
      required: [revision, hash, rules]
      properties:
        revision: {type: integer, minimum: 0}
        hash: {type: string}
        source: {type: string}
        rules: {type: array, items: {$ref: "#/components/schemas/FLXRule"}}
    FLXRulesChangeRequest:
      type: object
      additionalProperties: false
      required: [scope, expected_revision, target_revision, rules]
      properties:
        request_id: {type: string}
        scope: {$ref: "#/components/schemas/Scope"}
        expected_revision: {type: integer, minimum: 0}
        target_revision: {type: integer, minimum: 1}
        rules: {type: array, items: {$ref: "#/components/schemas/FLXRule"}}
    FLXRulesTestRequest:
      type: object
      additionalProperties: false
      required: [scope, user_id, object_type, primary_key]
      properties:
        request_id: {type: string}
        scope: {$ref: "#/components/schemas/Scope"}
        user_id: {type: string}
        object_type: {type: string}
        primary_key: {}
        rules: {type: array, items: {$ref: "#/components/schemas/FLXRule"}}
    Object:
      type: object
      additionalProperties: false
      required: [type, primary_key, data, etag]
      properties:
        type: {type: string}
        primary_key: {}
        data: {type: object}
        etag: {type: string}
    WriteRequest:
      type: object
      additionalProperties: false
      required: [scope, operation, type, primary_key]
      properties:
        request_id: {type: string}
        idempotency_key: {type: string}
        scope: {$ref: "#/components/schemas/Scope"}
        operation: {enum: [create, patch, delete]}
        type: {type: string}
        primary_key: {}
        data: {type: object}
        if_match: {type: string}
    WriteResult:
      type: object
      additionalProperties: false
      required: [cursor]
      properties:
        object: {$ref: "#/components/schemas/Object"}
        deleted: {type: boolean}
        cursor: {type: integer, minimum: 1}
    ChangeEvent:
      type: object
      additionalProperties: false
      required: [id, scope, cursor, snapshot, type, object_type, primary_key, source, committed_at]
      properties:
        id: {type: string}
        scope: {$ref: "#/components/schemas/Scope"}
        cursor: {type: integer, minimum: 1}
        snapshot: {type: integer, minimum: 1}
        type: {type: string}
        object_type: {type: string}
        primary_key: {}
        source: {enum: [sync, api, migration, system]}
        changed_fields: {type: array, items: {type: string}}
        before: {type: object}
        after: {type: object}
        committed_at: {type: string, format: date-time}
    ChangesResult:
      type: object
      additionalProperties: false
      required: [events, next_cursor]
      properties:
        events: {type: array, items: {$ref: "#/components/schemas/ChangeEvent"}}
        next_cursor: {type: integer, minimum: 0}
    RelatedRead:
      type: object
      additionalProperties: false
      required: [as, from, where]
      properties:
        as: {type: string}
        from: {type: string}
        where: {type: object}
        sort: {type: array, items: {type: object}}
        limit: {type: integer, minimum: 1, maximum: 100}
        one: {type: boolean}
    MaterializeRequest:
      type: object
      additionalProperties: false
      required: [scope, event_id]
      properties:
        scope: {$ref: "#/components/schemas/Scope"}
        event_id: {type: string}
        reads: {type: array, maxItems: 5, items: {$ref: "#/components/schemas/RelatedRead"}}
    EventContext:
      type: object
      additionalProperties: false
      required: [event]
      properties:
        event: {$ref: "#/components/schemas/ChangeEvent"}
        before: {type: object}
        after: {type: object}
        related: {type: object}
    Health:
      type: object
      required: [status, version, capabilities]
      properties:
        status: {const: ok}
        version: {type: string}
        capabilities: {type: array, items: {type: string}}
    Error:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code: {type: string}
        message: {type: string}
        details: {type: object}
