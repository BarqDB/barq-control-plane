name: Validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

env:
  BARQ_GO_COMMIT: 2a3691750fc0c98cc39657a3c4cb04f3c4596a17
  BARQ_CORE_COMMIT: 8188d736705225a840a7982fce66ef12cbe917b8
  RESTIC_VERSION: 0.19.1
  COSIGN_VERSION: 3.1.1

jobs:
  server:
    name: Server build and tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out control plane
        uses: actions/checkout@v7
        with:
          path: server

      - name: Check out barq-go
        uses: actions/checkout@v7
        with:
          repository: BarqDB/barq-go
          ref: ${{ env.BARQ_GO_COMMIT }}
          path: client/barq-go
          submodules: recursive

      - name: Install native build tools
        run: sudo apt-get update && sudo apt-get install -y cmake g++ libssl-dev zlib1g-dev

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache: true
          cache-dependency-path: server/go.sum

      - name: Build BarqDB client library
        run: make -C client/barq-go native

      - name: Test
        working-directory: server
        run: go test -race ./...

      - name: Vet
        working-directory: server
        run: go vet ./...

      - name: Build server
        working-directory: server
        run: |
          CGO_ENABLED=1 go build -trimpath -o barq-server ./cmd/barq-server
          CGO_ENABLED=0 go build -trimpath -ldflags "-X main.version=ci" -o barqctl ./cmd/barqctl

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: barq-linux-amd64
          path: |
            server/barq-server
            server/barqctl
          if-no-files-found: error
          retention-days: 7

  docker:
    name: Docker build
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out control plane
        uses: actions/checkout@v7
        with:
          path: server

      - name: Check out barq-go
        uses: actions/checkout@v7
        with:
          repository: BarqDB/barq-go
          ref: ${{ env.BARQ_GO_COMMIT }}
          path: client/barq-go
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: server/Dockerfile
          push: false
          load: true
          tags: barq-control-plane:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test migration preflight
        run: docker run --rm barq-control-plane:ci migrate --check --from 1 --to 1

  core-image:
    name: Core Docker build and smoke test
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out Core
        uses: actions/checkout@v7
        with:
          repository: BarqDB/barq-core
          ref: ${{ env.BARQ_CORE_COMMIT }}
          path: core
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Core image
        uses: docker/build-push-action@v7
        with:
          context: core
          file: core/Dockerfile.server
          load: true
          push: false
          tags: barq-core:ci
          cache-from: type=gha,scope=core
          cache-to: type=gha,mode=max,scope=core

      - name: Smoke test Core image
        run: |
          docker run -d --name barq-core-ci \
            -e BARQ_INTERNAL_SECRET=ci-secret \
            -p 127.0.0.1:19090:9090 \
            barq-core:ci \
            --root-dir /var/lib/barq \
            --allow-unsigned-tokens \
            --host 0.0.0.0 \
            --port 9090 \
            --internal-api-secret ci-secret \
            --log-level error
          for _ in $(seq 1 30); do
            if curl -fsS -H "Authorization: Bearer ci-secret" \
              http://127.0.0.1:19090/internal/v1/health; then
              exit 0
            fi
            sleep 1
          done
          docker logs barq-core-ci
          exit 1

      - name: Stop Core image
        if: always()
        run: docker rm -f barq-core-ci >/dev/null 2>&1 || true

  encrypted-backup:
    name: Encrypted S3 backup and restore
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out control plane
        uses: actions/checkout@v7
        with:
          path: server

      - name: Check out barq-go module
        uses: actions/checkout@v7
        with:
          repository: BarqDB/barq-go
          ref: ${{ env.BARQ_GO_COMMIT }}
          path: client/barq-go
          submodules: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache: true
          cache-dependency-path: server/go.sum

      - name: Install checked backup tools
        run: |
          minio="minio.RELEASE.2025-09-07T16-13-09Z"
          minio_base="https://dl.min.io/server/minio/release/linux-amd64/archive"
          curl --fail --silent --show-error --location --output "/tmp/${minio}" "${minio_base}/${minio}"
          curl --fail --silent --show-error --location --output /tmp/minio.sha256 "${minio_base}/${minio}.sha256sum"
          (cd /tmp && sha256sum --check --strict minio.sha256)
          mv "/tmp/${minio}" /tmp/minio
          chmod 0755 /tmp/minio

          restic="restic_${RESTIC_VERSION}_linux_amd64.bz2"
          restic_base="https://github.com/restic/restic/releases/download/v${RESTIC_VERSION}"
          curl --fail --silent --show-error --location --output "/tmp/${restic}" "${restic_base}/${restic}"
          curl --fail --silent --show-error --location --output /tmp/restic-sha256 "${restic_base}/SHA256SUMS"
          (cd /tmp && grep "  ${restic}$" restic-sha256 | sha256sum --check --strict -)
          bzip2 --decompress --stdout "/tmp/${restic}" > /tmp/restic
          chmod 0755 /tmp/restic
          /tmp/restic version

          cosign="cosign-linux-amd64"
          cosign_base="https://github.com/sigstore/cosign/releases/download/v${COSIGN_VERSION}"
          curl --fail --silent --show-error --location --output "/tmp/${cosign}" "${cosign_base}/${cosign}"
          curl --fail --silent --show-error --location --output /tmp/cosign-checksums "${cosign_base}/cosign_checksums.txt"
          (cd /tmp && grep "  ${cosign}$" cosign-checksums | sha256sum --check --strict -)
          mv "/tmp/${cosign}" /tmp/cosign
          chmod 0755 /tmp/cosign
          /tmp/cosign version

      - name: Test the release bundle installer
        working-directory: server
        run: |
          sh -n deploy/install.sh
          mkdir -p /tmp/barq-package /tmp/barq-release /tmp/barq-install
          CGO_ENABLED=0 go build -trimpath -ldflags "-s -w -X main.version=v0.0.0-ci" -o /tmp/barq-package/barqctl ./cmd/barqctl
          cp /tmp/restic /tmp/cosign /tmp/barq-package/
          tar -C /tmp/barq-package -czf /tmp/barq-release/barq-v0.0.0-ci-linux-amd64.tar.gz barqctl restic cosign
          (cd /tmp/barq-release && sha256sum barq-v0.0.0-ci-linux-amd64.tar.gz > barq-v0.0.0-ci-linux-amd64.tar.gz.sha256)
          BARQ_INSTALL_DIR=/tmp/barq-install \
            BARQ_RELEASE_BASE_URL=file:///tmp/barq-release \
            sh deploy/install.sh v0.0.0-ci
          /tmp/barq-install/barqctl version
          /tmp/barq-install/restic version
          /tmp/barq-install/cosign version

      - name: Start S3-compatible test server
        env:
          MINIO_ROOT_USER: barq-ci
          MINIO_ROOT_PASSWORD: barq-ci-secret-password
        run: |
          mkdir -p /tmp/minio-data
          nohup /tmp/minio server /tmp/minio-data --address 127.0.0.1:19000 >/tmp/minio.log 2>&1 &
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:19000/minio/health/live; then exit 0; fi
            sleep 1
          done
          cat /tmp/minio.log
          exit 1

      - name: Test encrypted upload and full restore
        working-directory: server
        env:
          PATH: /tmp:/usr/local/bin:/usr/bin:/bin
          AWS_ACCESS_KEY_ID: barq-ci
          AWS_SECRET_ACCESS_KEY: barq-ci-secret-password
          BARQ_TEST_S3_REPOSITORY: s3:http://127.0.0.1:19000/barq-ci-${{ github.run_id }}
        run: go test -run TestS3EncryptedBackupIntegration -v ./internal/deployment

      - name: Show S3 logs on failure
        if: failure()
        run: cat /tmp/minio.log || true
