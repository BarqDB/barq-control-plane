name: Validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

env:
  BARQ_GO_COMMIT: 2a3691750fc0c98cc39657a3c4cb04f3c4596a17
  BARQ_CORE_COMMIT: 9df437cbff1f352f90fe0cbee1612722a03830d0
  RESTIC_VERSION: 0.19.1
  COSIGN_VERSION: 3.1.1

jobs:
  server:
    name: Server build and tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out control plane
        uses: actions/checkout@v7
        with:
          path: server

      - name: Check out barq-go
        uses: actions/checkout@v7
        with:
          repository: BarqDB/barq-go
          ref: ${{ env.BARQ_GO_COMMIT }}
          path: client/barq-go
          submodules: recursive

      - name: Install native build tools
        run: sudo apt-get update && sudo apt-get install -y cmake g++ libssl-dev zlib1g-dev

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache: true
          cache-dependency-path: server/go.sum

      - name: Build BarqDB client library
        run: make -C client/barq-go native

      - name: Check embedded control UI
        working-directory: server
        run: node --check internal/console/web/app.js

      - name: Test
        working-directory: server
        run: go test -race ./...

      - name: Vet
        working-directory: server
        run: go vet ./...

      - name: Build server
        working-directory: server
        run: |
          CGO_ENABLED=1 go build -trimpath -o barq-server ./cmd/barq-server
          CGO_ENABLED=0 go build -trimpath -ldflags "-X main.version=ci" -o barqctl ./cmd/barqctl

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: barq-linux-amd64
          path: |
            server/barq-server
            server/barqctl
          if-no-files-found: error
          retention-days: 7

  docker:
    name: Control Docker build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Check out control plane
        uses: actions/checkout@v7
        with:
          path: server

      - name: Check out barq-go
        uses: actions/checkout@v7
        with:
          repository: BarqDB/barq-go
          ref: ${{ env.BARQ_GO_COMMIT }}
          path: client/barq-go
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: server/Dockerfile
          push: false
          load: true
          tags: barq-control-plane:ci-${{ matrix.arch }}
          cache-from: type=gha,scope=control-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=control-${{ matrix.arch }}

      - name: Smoke test migration preflight
        run: docker run --rm barq-control-plane:ci-${{ matrix.arch }} migrate --check --from 1 --to 1

  core-image:
    name: Core Docker build and smoke test (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Check out control plane
        uses: actions/checkout@v7
        with:
          path: server

      - name: Check out Core
        uses: actions/checkout@v7
        with:
          repository: BarqDB/barq-core
          ref: ${{ env.BARQ_CORE_COMMIT }}
          path: core
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Core image
        uses: docker/build-push-action@v7
        with:
          context: core
          file: server/Dockerfile.core
          load: true
          push: false
          tags: barq-core:ci-${{ matrix.arch }}
          cache-from: type=gha,scope=core-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=core-${{ matrix.arch }}

      - name: Smoke test Core image
        run: |
          docker run -d --name barq-core-ci \
            -e BARQ_INTERNAL_SECRET=ci-secret \
            -p 127.0.0.1:19090:9090 \
            barq-core:ci-${{ matrix.arch }} \
            --root-dir /var/lib/barq \
            --allow-unsigned-tokens \
            --host 0.0.0.0 \
            --port 9090 \
            --enable-flx \
            --internal-api-secret ci-secret \
            --log-level error
          for _ in $(seq 1 30); do
            if curl -fsS -H "Authorization: Bearer ci-secret" \
              http://127.0.0.1:19090/internal/v1/health | grep -q 'flx_rules'; then
              exit 0
            fi
            sleep 1
          done
          docker logs barq-core-ci
          exit 1

      - name: Stop Core image
        if: always()
        run: docker rm -f barq-core-ci >/dev/null 2>&1 || true

  docker-e2e:
    name: Docker FLX end-to-end
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      BARQ_PROJECT: barq-flx-e2e
      BARQ_DOMAIN: localhost
      BARQ_CONTROL_IMAGE: barq-control-plane:ci-e2e
      BARQ_CORE_IMAGE: barq-core:ci-e2e
      BARQ_INTERNAL_SECRET: docker-internal-secret
      BARQ_API_KEY: docker-admin
      BARQ_TENANT: tenant-a
      BARQ_DATABASE: main
      BARQ_LOG_LEVEL: warn
      BARQ_ALLOW_PRIVATE_WEBHOOKS: "false"
    steps:
      - name: Check out control plane
        uses: actions/checkout@v7
        with:
          path: server

      - name: Check out barq-go
        uses: actions/checkout@v7
        with:
          repository: BarqDB/barq-go
          ref: ${{ env.BARQ_GO_COMMIT }}
          path: client/barq-go
          submodules: recursive

      - name: Check out Core
        uses: actions/checkout@v7
        with:
          repository: BarqDB/barq-core
          ref: ${{ env.BARQ_CORE_COMMIT }}
          path: core
          submodules: recursive

      - name: Build deployment images
        run: |
          docker build -f server/Dockerfile -t "$BARQ_CONTROL_IMAGE" .
          docker build -f server/Dockerfile.core -t "$BARQ_CORE_IMAGE" core

      - name: Create test JWT key
        run: |
          mkdir -p server/deploy/secrets
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out /tmp/barq-jwt-private.pem
          openssl pkey -in /tmp/barq-jwt-private.pem -pubout -out server/deploy/secrets/jwt-public.pem

      - name: Start generated deployment
        run: docker compose -f server/deploy/compose.yaml up -d --wait core control

      - name: Apply schema and live rule
        run: |
          docker compose -f server/deploy/compose.yaml exec -T core \
            curl -fsS \
              -H "Authorization: Bearer $BARQ_INTERNAL_SECRET" \
              -H 'Content-Type: application/json' \
              --data '{"request_id":"docker-schema","scope":{"tenant":"tenant-a","database":"main"},"version":1,"manifest":{"objects":[{"name":"Order","primary_key":{"name":"id","type":"string"},"properties":[{"name":"id","type":"string"},{"name":"owner_id","type":"string"}]}]}}' \
              http://127.0.0.1:9090/internal/v1/schema/apply
          docker compose -f server/deploy/compose.yaml exec -T control \
            curl -fsS -X PUT \
              -H "Authorization: Bearer $BARQ_API_KEY" \
              -H 'Idempotency-Key: docker-e2e-rule' \
              -H 'Content-Type: application/json' \
              --data '{"expected_revision":0,"rules":[{"object_type":"Order","read":"owner_id == $user.id","write":"owner_id == $user.id"}]}' \
              http://127.0.0.1:8080/v1/tenants/tenant-a/databases/main/sync-rules \
            | grep -q '"revision":1'

      - name: Restart and verify rule history
        run: |
          docker compose -f server/deploy/compose.yaml stop control
          docker compose -f server/deploy/compose.yaml restart core
          docker compose -f server/deploy/compose.yaml up -d --wait core control
          docker compose -f server/deploy/compose.yaml exec -T control \
            curl -fsS \
              -H "Authorization: Bearer $BARQ_API_KEY" \
              http://127.0.0.1:8080/v1/tenants/tenant-a/databases/main/sync-rules/revisions \
            | grep -q '"request_id":"docker-e2e-rule"'

      - name: Show deployment logs
        if: failure()
        run: docker compose -f server/deploy/compose.yaml logs --no-color

      - name: Stop generated deployment
        if: always()
        run: docker compose -f server/deploy/compose.yaml down --volumes

  encrypted-backup:
    name: Encrypted S3 backup and restore
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out control plane
        uses: actions/checkout@v7
        with:
          path: server

      - name: Check out barq-go module
        uses: actions/checkout@v7
        with:
          repository: BarqDB/barq-go
          ref: ${{ env.BARQ_GO_COMMIT }}
          path: client/barq-go
          submodules: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache: true
          cache-dependency-path: server/go.sum

      - name: Install checked backup tools
        run: |
          minio="minio.RELEASE.2025-09-07T16-13-09Z"
          minio_base="https://dl.min.io/server/minio/release/linux-amd64/archive"
          curl --fail --silent --show-error --location --output "/tmp/${minio}" "${minio_base}/${minio}"
          curl --fail --silent --show-error --location --output /tmp/minio.sha256 "${minio_base}/${minio}.sha256sum"
          (cd /tmp && sha256sum --check --strict minio.sha256)
          mv "/tmp/${minio}" /tmp/minio
          chmod 0755 /tmp/minio

          restic="restic_${RESTIC_VERSION}_linux_amd64.bz2"
          restic_base="https://github.com/restic/restic/releases/download/v${RESTIC_VERSION}"
          curl --fail --silent --show-error --location --output "/tmp/${restic}" "${restic_base}/${restic}"
          curl --fail --silent --show-error --location --output /tmp/restic-sha256 "${restic_base}/SHA256SUMS"
          (cd /tmp && grep "  ${restic}$" restic-sha256 | sha256sum --check --strict -)
          bzip2 --decompress --stdout "/tmp/${restic}" > /tmp/restic
          chmod 0755 /tmp/restic
          /tmp/restic version

          cosign="cosign-linux-amd64"
          cosign_base="https://github.com/sigstore/cosign/releases/download/v${COSIGN_VERSION}"
          curl --fail --silent --show-error --location --output "/tmp/${cosign}" "${cosign_base}/${cosign}"
          curl --fail --silent --show-error --location --output /tmp/cosign-checksums "${cosign_base}/cosign_checksums.txt"
          (cd /tmp && grep "  ${cosign}$" cosign-checksums | sha256sum --check --strict -)
          mv "/tmp/${cosign}" /tmp/cosign
          chmod 0755 /tmp/cosign
          /tmp/cosign version

      - name: Test the release bundle installer
        working-directory: server
        run: |
          sh -n deploy/install.sh
          mkdir -p /tmp/barq-package /tmp/barq-release /tmp/barq-install
          CGO_ENABLED=0 go build -trimpath -ldflags "-s -w -X main.version=v0.0.0-ci" -o /tmp/barq-package/barqctl ./cmd/barqctl
          cp /tmp/restic /tmp/cosign /tmp/barq-package/
          tar -C /tmp/barq-package -czf /tmp/barq-release/barq-v0.0.0-ci-linux-amd64.tar.gz barqctl restic cosign
          (cd /tmp/barq-release && sha256sum barq-v0.0.0-ci-linux-amd64.tar.gz > barq-v0.0.0-ci-linux-amd64.tar.gz.sha256)
          BARQ_INSTALL_DIR=/tmp/barq-install \
            BARQ_RELEASE_BASE_URL=file:///tmp/barq-release \
            sh deploy/install.sh v0.0.0-ci
          /tmp/barq-install/barqctl version
          /tmp/barq-install/restic version
          /tmp/barq-install/cosign version

      - name: Start S3-compatible test server
        env:
          MINIO_ROOT_USER: barq-ci
          MINIO_ROOT_PASSWORD: barq-ci-secret-password
        run: |
          mkdir -p /tmp/minio-data
          nohup /tmp/minio server /tmp/minio-data --address 127.0.0.1:19000 >/tmp/minio.log 2>&1 &
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:19000/minio/health/live; then exit 0; fi
            sleep 1
          done
          cat /tmp/minio.log
          exit 1

      - name: Test encrypted upload and full restore
        working-directory: server
        env:
          PATH: /tmp:/usr/local/bin:/usr/bin:/bin
          AWS_ACCESS_KEY_ID: barq-ci
          AWS_SECRET_ACCESS_KEY: barq-ci-secret-password
          BARQ_TEST_S3_REPOSITORY: s3:http://127.0.0.1:19000/barq-ci-${{ github.run_id }}
        run: go test -run TestS3EncryptedBackupIntegration -v ./internal/deployment

      - name: Show S3 logs on failure
        if: failure()
        run: cat /tmp/minio.log || true
