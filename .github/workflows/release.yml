name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version for a test build. Images are pushed; no GitHub release is published."
        required: true
        default: v0.0.0-test

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

env:
  BARQ_GO_COMMIT: 2a3691750fc0c98cc39657a3c4cb04f3c4596a17
  BARQ_CORE_COMMIT: 9df437cbff1f352f90fe0cbee1612722a03830d0
  RESTIC_VERSION: 0.19.1
  COSIGN_VERSION: 3.1.1
  CONTROL_IMAGE: ghcr.io/barqdb/barq-control-plane
  CORE_IMAGE: ghcr.io/barqdb/barq-core
  VERSION: ${{ inputs.version || github.ref_name }}

jobs:
  control-build:
    name: Build control-plane image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Check out control plane
        uses: actions/checkout@v7
        with:
          path: server

      - name: Check out barq-go
        uses: actions/checkout@v7
        with:
          repository: BarqDB/barq-go
          ref: ${{ env.BARQ_GO_COMMIT }}
          path: client/barq-go
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: server/Dockerfile
          platforms: linux/${{ matrix.arch }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ env.VERSION }}
            org.opencontainers.image.revision=${{ github.sha }}
          sbom: true
          provenance: mode=max
          outputs: type=image,name=${{ env.CONTROL_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=control-release-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=control-release-${{ matrix.arch }}

      - name: Scan image
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_PLATFORM: linux/${{ matrix.arch }}
        with:
          image-ref: ${{ env.CONTROL_IMAGE }}@${{ steps.build.outputs.digest }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Save digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: control-digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  control-image:
    name: Publish control-plane image
    runs-on: ubuntu-24.04
    needs: control-build
    outputs:
      digest: ${{ steps.merge.outputs.digest }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          pattern: control-digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge per-architecture digests into one manifest list
        id: merge
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create --tag "${CONTROL_IMAGE}:${VERSION}" \
            $(printf "${CONTROL_IMAGE}@sha256:%s " *)
          digest=$(docker buildx imagetools inspect "${CONTROL_IMAGE}:${VERSION}" \
            --format '{{json .Manifest}}' | jq -r '.digest')
          case "$digest" in
            sha256:????????????????????????????????????????????????????????????????) ;;
            *) echo "unexpected manifest list digest: $digest" >&2; exit 1 ;;
          esac
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign manifest list digest
        run: cosign sign --yes "${CONTROL_IMAGE}@${{ steps.merge.outputs.digest }}"

  core-build:
    name: Build Core image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Check out control plane
        uses: actions/checkout@v7
        with:
          path: server

      - name: Check out Core
        uses: actions/checkout@v7
        with:
          repository: BarqDB/barq-core
          ref: ${{ env.BARQ_CORE_COMMIT }}
          path: core
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: core
          file: server/Dockerfile.core
          platforms: linux/${{ matrix.arch }}
          labels: |
            org.opencontainers.image.source=https://github.com/BarqDB/barq-core
            org.opencontainers.image.version=${{ env.VERSION }}
            org.opencontainers.image.revision=${{ env.BARQ_CORE_COMMIT }}
          sbom: true
          provenance: mode=max
          outputs: type=image,name=${{ env.CORE_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=core-release-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=core-release-${{ matrix.arch }}

      - name: Scan image
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_PLATFORM: linux/${{ matrix.arch }}
        with:
          image-ref: ${{ env.CORE_IMAGE }}@${{ steps.build.outputs.digest }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Save digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: core-digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  core-image:
    name: Publish Core image
    runs-on: ubuntu-24.04
    needs: core-build
    outputs:
      digest: ${{ steps.merge.outputs.digest }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          pattern: core-digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge per-architecture digests into one manifest list
        id: merge
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create --tag "${CORE_IMAGE}:${VERSION}" \
            $(printf "${CORE_IMAGE}@sha256:%s " *)
          digest=$(docker buildx imagetools inspect "${CORE_IMAGE}:${VERSION}" \
            --format '{{json .Manifest}}' | jq -r '.digest')
          case "$digest" in
            sha256:????????????????????????????????????????????????????????????????) ;;
            *) echo "unexpected manifest list digest: $digest" >&2; exit 1 ;;
          esac
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign manifest list digest
        run: cosign sign --yes "${CORE_IMAGE}@${{ steps.merge.outputs.digest }}"

  barqctl:
    name: Build barqctl (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Check out control plane
        uses: actions/checkout@v7
        with:
          path: server

      - name: Check out barq-go module
        uses: actions/checkout@v7
        with:
          repository: BarqDB/barq-go
          ref: ${{ env.BARQ_GO_COMMIT }}
          path: client/barq-go
          submodules: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache: true
          cache-dependency-path: server/go.sum

      - name: Build barqctl
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        working-directory: server
        run: |
          suffix=""
          if [ "$GOOS" = windows ]; then suffix=".exe"; fi
          mkdir -p "dist/package"
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o "dist/package/barqctl${suffix}" ./cmd/barqctl

          base="https://github.com/restic/restic/releases/download/v${RESTIC_VERSION}"
          curl --fail --silent --show-error --location --output /tmp/SHA256SUMS "${base}/SHA256SUMS"
          if [ "$GOOS" = windows ]; then
            asset="restic_${RESTIC_VERSION}_${GOOS}_${GOARCH}.zip"
            curl --fail --silent --show-error --location --output "/tmp/${asset}" "${base}/${asset}"
            (cd /tmp && grep "  ${asset}$" SHA256SUMS | sha256sum --check --strict -)
            unzip -p "/tmp/${asset}" > "dist/package/restic.exe"
          else
            asset="restic_${RESTIC_VERSION}_${GOOS}_${GOARCH}.bz2"
            curl --fail --silent --show-error --location --output "/tmp/${asset}" "${base}/${asset}"
            (cd /tmp && grep "  ${asset}$" SHA256SUMS | sha256sum --check --strict -)
            bzip2 --decompress --stdout "/tmp/${asset}" > "dist/package/restic"
            chmod 0755 "dist/package/restic"
          fi

          cosign_suffix=""
          if [ "$GOOS" = windows ]; then cosign_suffix=".exe"; fi
          cosign_asset="cosign-${GOOS}-${GOARCH}${cosign_suffix}"
          cosign_base="https://github.com/sigstore/cosign/releases/download/v${COSIGN_VERSION}"
          curl --fail --silent --show-error --location --output "/tmp/${cosign_asset}" "${cosign_base}/${cosign_asset}"
          curl --fail --silent --show-error --location --output /tmp/cosign-checksums "${cosign_base}/cosign_checksums.txt"
          (cd /tmp && grep "  ${cosign_asset}$" cosign-checksums | sha256sum --check --strict -)
          cp "/tmp/${cosign_asset}" "dist/package/cosign${cosign_suffix}"
          chmod 0755 "dist/package/cosign${cosign_suffix}"

          archive="barq-${VERSION}-${GOOS}-${GOARCH}"
          if [ "$GOOS" = windows ]; then
            (cd dist/package && zip -9 "../${archive}.zip" barqctl.exe restic.exe cosign.exe)
            (cd dist && sha256sum "${archive}.zip" > "${archive}.zip.sha256")
          else
            tar -C dist/package -czf "dist/${archive}.tar.gz" barqctl restic cosign
            (cd dist && sha256sum "${archive}.tar.gz" > "${archive}.tar.gz.sha256")
          fi
          rm -rf dist/package

      - name: Upload barqctl
        uses: actions/upload-artifact@v7
        with:
          name: barqctl-${{ matrix.goos }}-${{ matrix.goarch }}
          path: server/dist/*
          if-no-files-found: error

  release:
    name: Publish release manifest
    runs-on: ubuntu-24.04
    needs: [control-image, core-image, barqctl]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Check out installers
        uses: actions/checkout@v7
        with:
          path: server

      - name: Download barqctl builds
        uses: actions/download-artifact@v8
        with:
          pattern: barqctl-*
          path: dist
          merge-multiple: true

      - name: Write fixed-digest release manifest
        env:
          CONTROL_DIGEST: ${{ needs.control-image.outputs.digest }}
          CORE_DIGEST: ${{ needs.core-image.outputs.digest }}
        run: |
          python3 - <<'PY'
          import json, os
          manifest = {
              "version": os.environ["VERSION"],
              "control_image": os.environ["CONTROL_IMAGE"] + "@" + os.environ["CONTROL_DIGEST"],
              "core_image": os.environ["CORE_IMAGE"] + "@" + os.environ["CORE_DIGEST"],
              "internal_protocol": 1,
              "core_data_format": 1,
              "control_schema": 1,
              "bundle_version": 2,
              "core_commit": os.environ["BARQ_CORE_COMMIT"],
              "barq_go_commit": os.environ["BARQ_GO_COMMIT"],
          }
          with open("dist/release.json", "w", encoding="utf-8") as output:
              json.dump(manifest, output, indent=2)
              output.write("\n")
          PY

      - name: Add installers
        run: |
          cp server/deploy/install.sh dist/install.sh
          cp server/deploy/install.ps1 dist/install.ps1

      - name: Attest release files
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            dist/barq-*
            dist/install.*
            dist/release.json

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist/*
